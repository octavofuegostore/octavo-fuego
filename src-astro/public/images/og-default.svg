<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1410;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D2E22;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Decorative line -->
  <line x1="80" y1="280" x2="400" y2="280" stroke="#C4956A" stroke-width="2" />
  <!-- Brand name -->
  <text x="80" y="200" font-family="'Playfair Display', Georgia, serif" font-size="64" font-weight="700" fill="#F2EFE8">Octavo Fuego</text>
  <!-- Tagline -->
  <text x="80" y="340" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="400" fill="#C4956A">Rapé do Acre — Amazonian Sacred Snuff</text>
  <!-- Bottom text -->
  <text x="80" y="480" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="300" fill="#8C8680">Directo de la Amazonía, con propósito</text>
  <!-- Decorative circle -->
  <circle cx="1050" cy="315" r="120" fill="none" stroke="#C4956A" stroke-width="1" opacity="0.3" />
  <circle cx="1050" cy="315" r="80" fill="none" stroke="#C4956A" stroke-width="1" opacity="0.2" />
</svg>
